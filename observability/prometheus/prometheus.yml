global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # The Flask backend runs on the host (see README: python web/backend/app.py,
  # port 5001). Run it bound to 0.0.0.0 so the container can scrape it.
  - job_name: realview-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5001"]

  # The async Vision worker exposes pipeline metrics on :9101 (its own
  # prometheus_client server). Runs as the worker container (messaging/
  # docker-compose.yml maps 9101 to the host) or via messaging/demo_worker.py.
  - job_name: realview-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9101"]
